<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meesho App Footer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding-bottom:70px;
}

/* Sample content */
.content{
    padding:20px;
}

.content h2{
    color:#f43397;
    margin-bottom:10px;
}

/* Bottom Navigation */
.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:60px;
    background:#fff;
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:1px solid #ddd;
    box-shadow:0 -2px 8px rgba(0,0,0,0.1);
}

.nav-item{
    text-decoration:none;
    color:#666;
    text-align:center;
    font-size:12px;
    flex:1;
}

.nav-item span{
    display:block;
    font-size:22px;
    margin-bottom:3px;
}

.nav-item.active{
    color:#f43397;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="content">
    <h2>Meesho Clone</h2>
    <p>Your page content goes here.</p>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">

    <a href="dashboard.html" class="nav-item active">
        <span>🏠</span>

    </a>

   <a href="dashboard.html#categories" class="nav-item">

</a>
    <a href="dashboard.html#products" class="nav-item">

</a>

    </a>
